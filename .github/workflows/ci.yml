name: RecoFlix CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main ]

jobs:
  # --- Zadanie dla Frontendu (React) ---
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build

      - name: Run Frontend Tests
        run: npx vitest run

  # --- Zadanie dla Backendu (Python) ---
  backend-check:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: ./backend

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.10'
            cache: 'pip'
            cache-dependency-path: './backend/requirements.txt'

        - name: Create Firebase Service Account File
          run: |
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            # Instalujemy pakiety testowe (na wypadek, gdybyś nie dodał ich jeszcze do requirements.txt)
            pip install pytest httpx

        - name: Lint with flake8
          run: |
            pip install flake8
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

        - name: Run Backend Tests
          run: pytest -v